apiVersion: apps/v1
kind: Deployment
metadata:
  name: lb-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lb-demo
  template:
    metadata:
      labels:
        app: lb-demo
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80